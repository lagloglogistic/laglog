services:
  - type: web
    name: laglog
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATA_DIR
        value: /opt/render/project/data
    disk:
      name: laglog-data
      mountPath: /opt/render/project/data
      sizeGB: 1
